<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Hadjia Market</title>
    <link rel="icon" href="Logo.jpg.jpg" type="image/png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="menu">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="produits.html">Produits</a></li>
          <li><a href="categories.html">Catégories</a></li>
          <li><a href="promotions.html">Promotions</a></li>
          <li><a href="apropos.html">À propos</a></li>
          <li><a href="commande.html">Commande</a></li>
          <button class="btn"><a href="contact.html">Contact</a></button>
        </ul>
      </nav>
    </header>
    <main>
      <h3 style="color: crimson"><center>Résumé de commande</center></h3>
      <hr />
      <section class="intro">
        <h1>Passer une Commande</h1>
        <p>Remplissez le formulaire ci-dessous</p>
      </section>
      <form action="#" method="POST" class="commande-form">
        <div class="form-groupe">
          <label>👤 Nom complet :</label>
          <input type="text" name="nom" placeholder="Votre nom" required />
        </div>

        <div class="form-groupe">
          <label>📞 Téléphone :</label>
          <input
            type="text"
            name="telephone"
            placeholder="Votre téléphone"
            required
          />
        </div>

        <div class="form-groupe">
          <label>📧 Email :</label>
          <input type="email" name="email" placeholder="Votre email" required />
        </div>

        <div class="form-groupe">
          <label>🏙️ Commune :</label>
          <select name="commune" required>
            <option value="">-- Choisir une commune --</option>
            <option value="Abobo">Abobo</option>
            <option value="Adjamé">Adjamé</option>
            <option value="Attécoubé">Attécoubé</option>
            <option value="Cocody">Cocody</option>
            <option value="Koumassi">Koumassi</option>
            <option value="Marcory">Marcory</option>
            <option value="Plateau">Plateau</option>
            <option value="Port-Bouët">Port-Bouët</option>
            <option value="Treichville">Treichville</option>
            <option value="Yopougon">Yopougon</option>
          </select>
        </div>

        <div class="form-groupe">
          <label>🗺️ Région :</label>
          <select name="region" required>
            <option value="">-- Choisir une région --</option>
            <option value="Abidjan">Abidjan</option>
            <option value="Agnéby-Tiassa">Agnéby-Tiassa</option>
            <option value="Bafing">Bafing</option>
            <option value="Bagoué">Bagoué</option>
            <option value="Béré">Béré</option>
            <option value="Bounkani">Bounkani</option>
            <option value="Cavally">Cavally</option>
            <option value="Folon">Folon</option>
            <option value="Gbêkê">Gbêkê</option>
            <option value="Haut-Sassandra">Haut-Sassandra</option>
            <option value="Marahoué">Marahoué</option>
            <option value="Nawa">Nawa</option>
            <option value="Poro">Poro</option>
            <option value="San-Pédro">San-Pédro</option>
            <option value="Tonkpi">Tonkpi</option>
            <option value="Worodougou">Worodougou</option>
          </select>
        </div>

        <div class="form-groupe">
          <label>🛍️ Produit :</label>
          <select name="produit" required>
            <option value="">-- Choisir un produit --</option>
            <option value="Parfum Aviator - 10 000 FCFA">
              Parfum Aviator - 10 000 FCFA
            </option>
            <option value="Bijoux - 4 500 FCFA">Bijoux - 4 500 FCFA</option>
            <option value="Savon - 2 000 FCFA">Savon - 2 000 FCFA</option>
            <option value="Chaussures - 22 500 FCFA">
              Chaussures - 22 500 FCFA
            </option>
            <option value="Sac à main - 3 000 FCFA">
              Sac à main - 3 000 FCFA
            </option>
            <option value="Parfum 24K - 6 500 FCFA">
              Parfum 24K - 6 500 FCFA
            </option>
          </select>
        </div>

        <div class="form-groupe">
          <label>🔢 Quantité :</label>
          <input type="number" name="quantite" value="1" min="1" required />
        </div>

        <div class="form-groupe">
          <label>📍 Adresse de livraison :</label>
          <input
            type="text"
            name="adresse"
            placeholder="Votre adresse"
            required
          />
        </div>

        <div class="form-groupe">
          <label>💳 Payer par :</label>
          <select name="paiement" required>
            <option value="">-- Choisir un mode de paiement --</option>
            <option value="Wave">Wave</option>
            <option value="Orange Money">Orange Money</option>
            <option value="Momo">Momo</option>
            <option value="Cash">Payer en cash</option>
          </select>
        </div>

        <div class="form-groupe">
          <label>🚚 Frais de livraison :</label>
          <input type="text" name="frais_livraison" value="250 FCFA" readonly />
        </div>

        <input type="submit" value="✅ Commander" class="btn-commander" />
      </form>
    </main>
    <br /><br /><br /><br /><br /><br />
    <hr />
    <footer class="footer-total">
      <label>💰 Total :</label>
      <input type="text" placeholder="Total" readonly />
    </footer>
  </body>
</html>
